<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Second Brain</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,500;0,600;1,500&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="topbar">
    <div class="topbar-head">
      <div class="title-block">
        <div class="page-icon" aria-hidden="true">🧠</div>
        <h1>Second Brain</h1>
        <p class="subtitle">Alles, was du festhalten willst — an einem Ort, sofort durchsuchbar.</p>
      </div>
      <button id="settings-btn" type="button" aria-label="KI-Einstellungen">
        <span aria-hidden="true">✨</span> KI
      </button>
    </div>

    <div id="settings-panel" class="settings-panel" hidden>
      <label for="key-input">Gemini API-Key (nur lokal in deinem Browser gespeichert)</label>
      <div class="settings-row">
        <input id="key-input" type="password" placeholder="AIza… hier einfügen" autocomplete="off">
        <button id="save-key-btn" type="button">Speichern</button>
      </div>
      <p class="settings-hint">
        Kostenlos ohne Kreditkarte erstellen bei
        <a href="https://aistudio.google.com/apikey" target="_blank" rel="noopener">Google AI Studio</a>.
        Der Key verlässt deinen Browser nicht und landet nie im Repo.
      </p>
    </div>
  </header>

  <main class="page">

    <section class="composer" aria-label="Neue Notiz anlegen">
      <input id="title-input" type="text" placeholder="Titel" maxlength="80">
      <textarea id="content-input" placeholder="Was möchtest du festhalten?" rows="3"></textarea>
      <div class="composer-row">
        <input id="tags-input" type="text" placeholder="Tags, mit Komma getrennt (z.B. uni, idee)">
        <button id="autotag-btn" type="button" class="autotag-btn" title="Tags per KI vorschlagen">✨ Tags</button>
        <button id="add-btn">Notiz speichern</button>
      </div>
    </section>

    <section class="toolbar" aria-label="Suche und Filter">
      <input id="search-input" type="text" placeholder="Notizen durchsuchen…">
      <div id="tag-filters" class="tag-filters"></div>
    </section>

    <section id="notes-grid" class="notes-grid" aria-label="Notizen"></section>

    <p id="empty-state" class="empty-state" hidden>
      Noch keine Notizen. Leg oben deine erste an.
    </p>

  </main>

  <script src="script.js"></script>
</body>
</html>
